---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  {% include disqus.html %}
</article>


<div style="display: flex; flex-wrap: wrap; gap: 8px; align-items: center;">
  {% for tag in page.tags %}
    <a href="{{ site.baseurl }}/tags/{{ tag | slugify: 'latin' }}/"
       style="background-color: #f0f0f0; padding: 4px 10px; border-radius: 20px; font-size: 0.8em; text-decoration: none; color: #333;">
      {{ tag }}
    </a>
  {% endfor %}
</div>
