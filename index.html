---
layout: default
---

<div class="posts">
  {% for post in site.posts %}
    <article class="post" style="margin-bottom: 1.5em;">

      <h2 style="margin-bottom: 0.2em;">
        <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
      </h2>

      <div class="entry">
        {{ post.excerpt }}
      </div>

      <div style="font-size: 0.8em; color: #666; margin-bottom: 0.5em;">
        {{ post.date | date: "%B %e, %Y" }}
        {% for tag in post.tags %}
          <a href="{{ site.baseurl }}/tags/{{ tag | slugify: 'latin' }}/"
             style="background-color: #f0f0f0; padding: 2px 8px; border-radius: 20px; text-decoration: none; color: #333; margin-left: 4px;">
            {{ tag }}
          </a>
        {% endfor %}
      </div>

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
    </article>
  {% endfor %}
</div>
